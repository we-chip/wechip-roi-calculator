name: CI

# Runs the pytest suite on every PR and on pushes to main so the
# merge-manager's ci_state gate reads a real green/red signal from the
# statusCheckRollup. Without a test-running check the rollup is empty and
# agent PRs auto-merge UNVERIFIED through the none-doesn't-block policy.
# Rolled out fleet-wide by we-chip/WECHIP-OS scripts/fleet_rollout.py.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest

      - name: Run test suite
        run: python -m pytest tests/ -q
