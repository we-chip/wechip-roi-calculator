name: Copilot Setup Steps
on:
  workflow_dispatch:
  push:
    paths: [.github/workflows/copilot-setup-steps.yml]
  pull_request:
    paths: [.github/workflows/copilot-setup-steps.yml]
jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    # Grant the coding agent's environment read access to repo contents. Without
    # this the agent's internal checkout lands in a shallow/detached state and
    # `git rev-parse --abbrev-ref HEAD` exits 128 ("unknown revision"), crashing
    # the run before it reads the task. See community discussion #187279.
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Verify pytest collects
        run: python -m pytest tests/ --collect-only -q
