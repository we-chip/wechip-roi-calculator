name: Deploy wechip-roi-calculator

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-wechip-roi-calculator
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Build artifact
        run: |
          set -euo pipefail
          mkdir -p build
          rsync -a --exclude '__pycache__' --exclude '*.pyc' \
                --exclude '.git' --exclude '.github' \
                --exclude '*.db' --exclude '.venv' --exclude 'tests' \
                --exclude '.pytest_cache' --exclude 'docs' \
                --exclude '.vscode' --exclude 'cowork' --exclude 'shared' . build/
          pip install -r requirements.txt \
              --target=build/.python_packages/lib/site-packages
          echo "${{ github.sha }}" > build/build_commit.txt
          cd build && zip -r ../app.zip . && cd ..

      - uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: app.zip
          overwrite: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: app-build

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy zip
        run: |
          az webapp deploy \
            --name wechip-roi-calculator \
            --resource-group wechip-rg \
            --src-path app.zip \
            --type zip \
            --async false

  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        run: |
          set -euo pipefail
          URL="https://wechip-roi-calculator.azurewebsites.net/"
          deadline=$(( $(date +%s) + 180 ))
          while [ "$(date +%s)" -lt "${deadline}" ]; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "${URL}" || true)
            if [ "${code}" = "200" ]; then echo "OK ${code}"; exit 0; fi
            echo "Got ${code}, retrying..."; sleep 5
          done
          echo "Health check timed out"; exit 1
