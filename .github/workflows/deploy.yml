name: Deploy wechip-roi-calculator

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-wechip-roi-calculator
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  issues: write

jobs:
  deploy:
    # WECHIP-OS is internal -> this public repo can consume the reusable.
    uses: we-chip/WECHIP-OS/.github/workflows/azure-app-deploy.yml@main
    with:
      app_name: wechip-roi-calculator
      # No /api/health route: check the homepage returns 200 (no body marker).
      health_url: https://wechip-roi-calculator.azurewebsites.net/
      health_body_grep: ''
      verify_build_commit: false
    secrets: inherit
